name: CI

on:
  push:
  pull_request:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  toolchain-versions:
    name: 解析言序工具链版本
    runs-on: ubuntu-24.04
    outputs:
      minimum_tag: ${{ steps.versions.outputs.minimum_tag }}
      minimum_version: ${{ steps.versions.outputs.minimum_version }}
      stable_tag: ${{ steps.versions.outputs.stable_tag }}
      stable_version: ${{ steps.versions.outputs.stable_version }}
      yanbao_version: ${{ steps.versions.outputs.yanbao_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
      - id: versions
        name: 读取最低版本与当前稳定 Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          requirement="$(sed -n 's/^言序 = "\([^"]*\)"$/\1/p' 言序.toml)"
          if [[ ! "$requirement" =~ ^\>\=([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "言序.toml 的最低版本必须使用 >=X.Y.Z" >&2
            exit 1
          fi
          minimum_version="${BASH_REMATCH[1]}"
          minimum_tag="v$minimum_version"

          select_latest_core_tag() {
            awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/' | sort -V | tail -n 1
          }
          fixture_tag="$({
            printf '%s\n' v1.1.15 yanxu-package-v1.1.16 v1.1.16 v1.1.17-rc.1
          } | select_latest_core_tag)"
          test "$fixture_tag" = "v1.1.16"

          stable_tag="$(
            gh api --paginate repos/YanXuLang/yanxu/releases \
              --jq '.[] | select(.draft == false and .prerelease == false) | .tag_name' |
              select_latest_core_tag
          )"
          if [[ ! "$stable_tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "言序最新正式 Release 标签无效：$stable_tag" >&2
            exit 1
          fi
          stable_version="${BASH_REMATCH[1]}"
          oldest="$(printf '%s\n%s\n' "$minimum_version" "$stable_version" | sort -V | head -n 1)"
          if [[ "$oldest" != "$minimum_version" ]]; then
            echo "当前稳定言序 $stable_version 低于最低要求 $minimum_version" >&2
            exit 1
          fi
          yanbao_version="$(sed -n 's/^版本 = "\([^"]*\)"$/\1/p' 言序.toml)"
          test -n "$yanbao_version"
          {
            echo "minimum_tag=$minimum_tag"
            echo "minimum_version=$minimum_version"
            echo "stable_tag=$stable_tag"
            echo "stable_version=$stable_version"
            echo "yanbao_version=$yanbao_version"
          } >> "$GITHUB_OUTPUT"

  toolchain-compatibility:
    name: ${{ matrix.label }}
    needs: toolchain-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: minimum
            label: 最低兼容通道
          - channel: stable
            label: 当前稳定通道
          - channel: development
            label: 开发联调通道
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: matrix.channel != 'stable'
        with:
          repository: YanXuLang/yanxu
          path: yanxu-core
          ref: ${{ matrix.channel == 'minimum' && needs.toolchain-versions.outputs.minimum_tag || 'main' }}
      - name: 编译通道工具链
        if: matrix.channel != 'stable'
        run: cargo build --manifest-path yanxu-core/Cargo.toml --locked --bin yanxu
      - name: 定位通道工具链
        if: matrix.channel != 'stable'
        shell: bash
        run: echo "YANXU_BIN=$GITHUB_WORKSPACE/yanxu-core/target/debug/yanxu" >> "$GITHUB_ENV"
      - name: 安装当前稳定 Release
        if: matrix.channel == 'stable'
        shell: bash
        env:
          YANXU_VERSION: ${{ needs.toolchain-versions.outputs.stable_version }}
          YANXU_INSTALL_DIR: ${{ runner.temp }}/yanxu/bin
          YANXU_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --disable --fail --location --silent --show-error \
            --proto '=https' --tlsv1.2 \
            "https://raw.githubusercontent.com/YanXuLang/yanxu/${{ needs.toolchain-versions.outputs.stable_tag }}/scripts/install.sh" \
            --output "$RUNNER_TEMP/install-yanxu.sh"
          sh "$RUNNER_TEMP/install-yanxu.sh"
          echo "YANXU_BIN=$YANXU_INSTALL_DIR/yanxu" >> "$GITHUB_ENV"
      - name: 核对版本、能力与言包规格
        shell: bash
        env:
          YANXU_EXPECTED_VERSION: ${{ matrix.channel == 'minimum' && needs.toolchain-versions.outputs.minimum_version || matrix.channel == 'stable' && needs.toolchain-versions.outputs.stable_version || '' }}
        run: sh scripts/verify-toolchain.sh

  test:
    name: 当前稳定言序 / ${{ matrix.target }}
    needs: toolchain-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    env:
      YANXU_EXPECTED_VERSION: ${{ needs.toolchain-versions.outputs.stable_version }}
      YANBAO_EXPECTED_VERSION: ${{ needs.toolchain-versions.outputs.yanbao_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: YanXuLang/yanxu-gui
          path: yanxu-gui
          ref: main
      - name: 安装当前稳定言序（Unix）
        if: runner.os != 'Windows'
        shell: bash
        env:
          YANXU_VERSION: ${{ needs.toolchain-versions.outputs.stable_version }}
          YANXU_INSTALL_DIR: ${{ runner.temp }}/yanxu/bin
          YANXU_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --disable --fail --location --silent --show-error \
            --proto '=https' --tlsv1.2 \
            "https://raw.githubusercontent.com/YanXuLang/yanxu/${{ needs.toolchain-versions.outputs.stable_tag }}/scripts/install.sh" \
            --output "$RUNNER_TEMP/install-yanxu.sh"
          sh "$RUNNER_TEMP/install-yanxu.sh"
          echo "YANXU_BIN=$YANXU_INSTALL_DIR/yanxu" >> "$GITHUB_ENV"
      - name: 安装当前稳定言序（Windows）
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          YANXU_VERSION: ${{ needs.toolchain-versions.outputs.stable_version }}
          YANXU_INSTALL_DIR: ${{ runner.temp }}\yanxu\bin
          YANXU_GITHUB_TOKEN: ${{ github.token }}
        run: |
          $Script = Join-Path $env:RUNNER_TEMP "install-yanxu.ps1"
          Invoke-WebRequest -UseBasicParsing -Uri "https://raw.githubusercontent.com/YanXuLang/yanxu/${{ needs.toolchain-versions.outputs.stable_tag }}/scripts/install.ps1" -OutFile $Script
          & $Script
          "YANXU_BIN=$env:YANXU_INSTALL_DIR\yanxu.exe" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
      - name: 安装 Linux GUI 开发库
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev
      - name: 检查纯言序实现与 Unix 脚本
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test ! -e Cargo.toml
          test -z "$(find src -name '*.rs' -print -quit)"
          sh -n yanbao scripts/install.sh scripts/verify-toolchain.sh
          jq -e '."$id" == "https://yanxu.dev/schemas/yanbao-cli-output-v1.json"' schemas/yanbao-cli-output-v1.json >/dev/null
      - name: 检查纯言序实现与 Windows 脚本
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path Cargo.toml) { throw "言包不得包含 Cargo 工程" }
          if (Get-ChildItem src -Filter *.rs -Recurse) { throw "言包源码必须完全使用言序" }
          $CmdText = [System.Text.Encoding]::UTF8.GetString(
            [System.IO.File]::ReadAllBytes((Resolve-Path "yanbao.cmd"))
          )
          if ($CmdText -match '[^\x00-\x7F]') { throw "yanbao.cmd 必须只包含 ASCII 字符" }
          if (-not $CmdText.Contains("`r`n") -or $CmdText.Replace("`r`n", "").Contains("`n")) {
            throw "yanbao.cmd 必须只使用 CRLF 换行"
          }
          foreach ($Path in @("yanbao.ps1", "scripts/install.ps1", "scripts/write-sha256.ps1")) {
            $Bytes = [System.IO.File]::ReadAllBytes((Resolve-Path $Path))
            if ($Bytes | Where-Object { $_ -gt 127 }) { throw "$Path 必须只包含 ASCII 字符" }
            $Tokens = $null
            $Errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $Path), [ref]$Tokens, [ref]$Errors
            )
            if ($Errors.Count -gt 0) { throw "$Path 语法错误：$($Errors -join '; ')" }
            $WindowsPowerShell = Start-Process -FilePath powershell.exe -ArgumentList @(
              "-NoProfile", "-Command",
              "`$errors = `$null; [void][System.Management.Automation.Language.Parser]::ParseFile('$((Resolve-Path $Path).Path)', [ref]`$null, [ref]`$errors); if (`$errors.Count) { `$errors | Format-List; exit 1 }"
            ) -NoNewWindow -Wait -PassThru
            if ($WindowsPowerShell.ExitCode -ne 0) { throw "Windows PowerShell 5.1 无法解析 $Path" }
          }
          $ChecksumFixture = Join-Path $env:RUNNER_TEMP "yanbao-checksum-fixture"
          New-Item -ItemType Directory -Force -Path $ChecksumFixture | Out-Null
          $FixtureAsset = Join-Path $ChecksumFixture "yanbao-test.zip"
          [System.IO.File]::WriteAllBytes($FixtureAsset, [System.Text.Encoding]::ASCII.GetBytes("checksum fixture`n"))
          $FixtureChecksum = Join-Path $ChecksumFixture "yanbao-test.sha256"
          & "scripts\write-sha256.ps1" -InputPath $FixtureAsset -OutputPath $FixtureChecksum -AssetName "yanbao-test.zip"
      - name: 交叉校验 Windows SHA-256 文件
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          fixture="$RUNNER_TEMP/yanbao-checksum-fixture"
          test "$(wc -l < "$fixture/yanbao-test.sha256")" -eq 1
          if LC_ALL=C grep -q $'\r' "$fixture/yanbao-test.sha256"; then
            echo "Windows SHA-256 校验文件不得包含 CR 字节" >&2
            exit 1
          fi
          (cd "$fixture" && sha256sum --check yanbao-test.sha256)
          if command -v shasum >/dev/null 2>&1; then
            (cd "$fixture" && shasum -a 256 --check yanbao-test.sha256)
          fi
      - name: 核对版本、能力与言包规格
        shell: bash
        run: sh scripts/verify-toolchain.sh
      - name: 编译并验证独立应用
        shell: bash
        run: |
          suffix=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          app="$RUNNER_TEMP/yanbao-app$suffix"
          compile_source="$RUNNER_TEMP/yanbao-compile-source"
          rm -rf "$compile_source"
          mkdir -p "$compile_source"
          cp src/*.yx "$compile_source/"
          "$YANXU_BIN" compile "$compile_source/主.yx" -o "$app" --release --standalone
          version_output="$(YANXU_BIN="$YANXU_BIN" "$app" --version | tr -d '\r')"
          expected="$(printf '言包 %s\n言序 %s' "$YANBAO_EXPECTED_VERSION" "$YANXU_EXPECTED_VERSION")"
          test "$version_output" = "$expected"
          help_output="$(YANXU_BIN="$YANXU_BIN" "$app" build --help | tr -d '\r')"
          printf '%s\n' "$help_output" | grep -Fq 'yanbao build'
          expect_cli_failure() {
            code="$1"
            shift
            set +e
            output="$(YANXU_BIN="$YANXU_BIN" "$app" "$@" 2>&1)"
            status=$?
            set -e
            test "$status" -eq 1
            printf '%s\n' "$output" | grep -Fq "[$code]"
          }
          expect_cli_failure CLI003 clean --manifest-path
          expect_cli_failure CLI003 add 包名 --version
          expect_cli_failure CLI002 build --unknown-option
          expect_cli_failure CLI004 build --standalone --bundle
          set +e
          invalid_timeout_output="$(YANBAO_TIMEOUT=invalid YANXU_BIN="$YANXU_BIN" "$app" version 2>&1)"
          invalid_timeout_status=$?
          set -e
          test "$invalid_timeout_status" -eq 1
          printf '%s\n' "$invalid_timeout_output" | grep -Fq '[CLI009]'
          override_output="$(YANBAO_TIMEOUT=invalid YANXU_BIN="$YANXU_BIN" "$app" version --timeout 60000 | tr -d '\r')"
          test "$override_output" = "$expected"
          json_output="$(YANXU_BIN="$YANXU_BIN" "$app" version --message-format json)"
          printf '%s\n' "$json_output" | jq -e '
            .schema_version == 1 and .type == "result" and .command == "version" and
            .success == true and .exit_code == 0 and (.diagnostics | length) == 0
          ' >/dev/null
          json_lines="$(YANXU_BIN="$YANXU_BIN" "$app" version --message-format json-lines)"
          printf '%s\n' "$json_lines" | jq -e '.schema_version == 1 and (.type == "message" or .type == "result")' >/dev/null
          test "$(printf '%s\n' "$json_lines" | jq -s 'map(select(.type == "result")) | length')" -eq 1
          set +e
          json_failure="$(YANXU_BIN="$YANXU_BIN" "$app" build --unknown-option --message-format json 2>"$RUNNER_TEMP/yanbao-json-error.log")"
          json_failure_status=$?
          set -e
          test "$json_failure_status" -eq 1
          printf '%s\n' "$json_failure" | jq -e '
            .success == false and .exit_code == 1 and .phase == "failed" and
            .diagnostics[0].code == "CLI002" and .diagnostics[0].original_exit_code == 1
          ' >/dev/null
          test -s "$RUNNER_TEMP/yanbao-json-error.log"
          python_bin="$(command -v python3 || command -v python)"
          set +e
          subprocess_failure="$(YANXU_BIN="$python_bin" "$app" version --message-format json 2>"$RUNNER_TEMP/yanbao-subprocess-error.log")"
          subprocess_failure_status=$?
          set -e
          test "$subprocess_failure_status" -eq 1
          printf '%s\n' "$subprocess_failure" | jq -e '
            .diagnostics[0].code == "YANXU_PROTOCOL" and
            .diagnostics[0].original_exit_code == 2
          ' >/dev/null
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp "$app" yanbao-app.exe
            launcher_output="$(YANXU_BIN="$YANXU_BIN" ./yanbao.cmd --version | tr -d '\r')"
            rm -f yanbao-app.exe
            test "$launcher_output" = "$expected"
          fi
          standalone_project="$RUNNER_TEMP/yanbao-standalone-e2e"
          YANXU_BIN="$YANXU_BIN" "$app" init "$standalone_project" --name 独立应用验收 --force
          YANXU_BIN="$YANXU_BIN" "$app" doctor --manifest-path "$standalone_project"

          audit_dependency="$RUNNER_TEMP/yanbao-audit-dependency"
          YANXU_BIN="$YANXU_BIN" "$app" new "$audit_dependency" --name audit_dependency
          YANXU_BIN="$YANXU_BIN" "$app" add audit_dependency --path "$audit_dependency" \
            --manifest-path "$standalone_project" --offline
          audit_default="$(YANXU_BIN="$YANXU_BIN" "$app" audit \
            --manifest-path "$standalone_project" --json)"
          printf '%s\n' "$audit_default" | jq -e '
            .success == true and .exit_code == 0 and
            any(.diagnostics[]; .code == "AUDIT_LICENSE_MISSING" and .severity == "medium") and
            any(.changes[]; .kind == "audit_summary" and .details.deny_level == "high" and .details.denied == 0)
          ' >/dev/null
          audit_expired="$(YANXU_BIN="$YANXU_BIN" "$app" audit \
            --manifest-path "$standalone_project" \
            --suppress 'AUDIT_LICENSE_MISSING@2000-01-01@历史测试例外' --json)"
          printf '%s\n' "$audit_expired" | jq -e '
            .success == true and
            any(.diagnostics[]; .code == "AUDIT_SUPPRESSION_EXPIRED" and .severity == "medium") and
            any(.changes[]; .kind == "audit_summary" and .details.suppressed == 0 and .details.expired_suppressions == 1)
          ' >/dev/null
          set +e
          audit_denied="$(YANXU_BIN="$YANXU_BIN" "$app" audit \
            --manifest-path "$standalone_project" --deny-level medium --json \
            2>"$RUNNER_TEMP/yanbao-audit-denied.log")"
          audit_denied_status=$?
          set -e
          test "$audit_denied_status" -eq 1
          printf '%s\n' "$audit_denied" | jq -e '
            .success == false and .exit_code == 1 and .phase == "failed" and
            any(.diagnostics[]; .code == "AUDIT_LICENSE_MISSING" and .severity == "medium") and
            any(.diagnostics[]; .code == "AUDIT_DENIED" and .severity == "error") and
            any(.changes[]; .kind == "audit_summary" and .details.denied == 1)
          ' >/dev/null
          test -s "$RUNNER_TEMP/yanbao-audit-denied.log"
          audit_suppressed="$(YANXU_BIN="$YANXU_BIN" "$app" audit \
            --manifest-path "$standalone_project" --deny-level medium \
            --suppress 'AUDIT_LICENSE_MISSING@2099-12-31@已复核测试依赖' --json)"
          printf '%s\n' "$audit_suppressed" | jq -e '
            .success == true and .exit_code == 0 and
            any(.diagnostics[]; .code == "AUDIT_LICENSE_MISSING" and .severity == "suppressed") and
            any(.changes[]; .kind == "audit_suppressed" and .details.code == "AUDIT_LICENSE_MISSING") and
            any(.changes[]; .kind == "audit_summary" and .details.denied == 0 and .details.suppressed == 1)
          ' >/dev/null

          transaction_root="$RUNNER_TEMP/yanbao-transaction-e2e"
          transaction_dependency="$transaction_root/dependency"
          transaction_project="$transaction_root/project"
          rm -rf "$transaction_root"
          mkdir -p "$transaction_root"
          YANXU_BIN="$YANXU_BIN" "$app" new "$transaction_dependency" --name transaction_dep
          YANXU_BIN="$YANXU_BIN" "$app" new "$transaction_project" --name transaction_root
          cp "$transaction_project/言序.toml" "$transaction_root/manifest.original"
          cp "$transaction_project/言序.lock" "$transaction_root/lock.original"

          set +e
          YANXU_BIN="$YANXU_BIN" YANBAO_FAULT_INJECTION=dependency_after_resolve \
            "$app" add transaction_dep --path "$transaction_dependency" \
            --manifest-path "$transaction_project" --offline --message-format json \
            > "$transaction_root/dependency-failure.json" 2> "$transaction_root/dependency-failure.log"
          dependency_failure_status=$?
          set -e
          test "$dependency_failure_status" -eq 1
          jq -e 'any(.diagnostics[]; .code == "TXN900")' "$transaction_root/dependency-failure.json" >/dev/null
          cmp "$transaction_project/言序.toml" "$transaction_root/manifest.original"
          cmp "$transaction_project/言序.lock" "$transaction_root/lock.original"
          test ! -e "$transaction_project/.yanxu/yanbao-transaction"

          set +e
          YANXU_BIN="$YANXU_BIN" YANBAO_FAULT_INJECTION=dependency_after_resolve_interrupt \
            "$app" add transaction_dep --path "$transaction_dependency" \
            --manifest-path "$transaction_project" --offline --message-format json \
            > "$transaction_root/dependency-interrupt.json" 2> "$transaction_root/dependency-interrupt.log"
          dependency_interrupt_status=$?
          set -e
          test "$dependency_interrupt_status" -eq 1
          test -f "$transaction_project/.yanxu/yanbao-transaction/journal.json"
          cp "$transaction_project/言序.toml" "$transaction_root/manifest.transaction"
          printf '%s\n' 'concurrent manifest replacement' > "$transaction_project/言序.toml"
          set +e
          YANXU_BIN="$YANXU_BIN" "$app" add transaction_dep --path "$transaction_dependency" \
            --manifest-path "$transaction_project" --offline --recover --message-format json \
            > "$transaction_root/concurrent-rejected.json" 2> "$transaction_root/concurrent-rejected.log"
          concurrent_status=$?
          set -e
          test "$concurrent_status" -eq 1
          jq -e 'any(.diagnostics[]; .code == "TXN005")' "$transaction_root/concurrent-rejected.json" >/dev/null
          test -f "$transaction_project/.yanxu/yanbao-transaction/journal.json"
          cp "$transaction_root/manifest.transaction" "$transaction_project/言序.toml"
          set +e
          YANXU_BIN="$YANXU_BIN" "$app" doctor --manifest-path "$transaction_project" --message-format json \
            > "$transaction_root/blocked.json" 2> "$transaction_root/blocked.log"
          blocked_status=$?
          set -e
          test "$blocked_status" -eq 1
          jq -e 'any(.diagnostics[]; .code == "TXN001")' "$transaction_root/blocked.json" >/dev/null
          YANXU_BIN="$YANXU_BIN" "$app" add transaction_dep --path "$transaction_dependency" \
            --manifest-path "$transaction_project" --offline --recover --message-format json \
            > "$transaction_root/dependency-recovered.json"
          jq -e '
            .success == true and
            (.changes | map(.kind) | index("transaction_recovered")) != null and
            (.changes | map(.kind) | index("dependency_added")) != null
          ' "$transaction_root/dependency-recovered.json" >/dev/null
          test ! -e "$transaction_project/.yanxu/yanbao-transaction"

          cp "$transaction_project/言序.toml" "$transaction_root/manifest.with-dependency"
          cp "$transaction_project/言序.lock" "$transaction_root/lock.with-dependency"
          set +e
          YANXU_BIN="$YANXU_BIN" YANBAO_FAULT_INJECTION=new_first_file \
            "$app" new "$transaction_project" --name replacement --force --message-format json \
            > "$transaction_root/new-failure.json" 2> "$transaction_root/new-failure.log"
          new_failure_status=$?
          set -e
          test "$new_failure_status" -eq 1
          cmp "$transaction_project/言序.toml" "$transaction_root/manifest.with-dependency"
          cmp "$transaction_project/言序.lock" "$transaction_root/lock.with-dependency"
          test ! -e "$transaction_project/.yanxu/yanbao-transaction"
          test -z "$(find "$transaction_root" -maxdepth 1 -name '.yanbao-*' -print -quit)"

          set +e
          YANXU_BIN="$YANXU_BIN" YANBAO_FAULT_INJECTION=new_first_file_interrupt \
            "$app" new "$transaction_project" --name replacement --force --message-format json \
            > "$transaction_root/new-interrupt.json" 2> "$transaction_root/new-interrupt.log"
          new_interrupt_status=$?
          set -e
          test "$new_interrupt_status" -eq 1
          set +e
          YANXU_BIN="$YANXU_BIN" "$app" doctor --manifest-path "$transaction_project" --message-format json \
            > "$transaction_root/new-blocked.json" 2> "$transaction_root/new-blocked.log"
          new_blocked_status=$?
          set -e
          test "$new_blocked_status" -eq 1
          jq -e 'any(.diagnostics[]; .code == "TXN001")' "$transaction_root/new-blocked.json" >/dev/null
          YANXU_BIN="$YANXU_BIN" "$app" new "$transaction_project" --name replacement \
            --force --recover --message-format json > "$transaction_root/new-recovered.json"
          jq -e '
            .success == true and
            (.changes | map(.kind) | index("transaction_recovered")) != null and
            (.changes | map(.kind) | index("project_created")) != null
          ' "$transaction_root/new-recovered.json" >/dev/null
          test ! -e "$transaction_project/.yanxu/yanbao-transaction"
          test -z "$(find "$transaction_root" -maxdepth 1 -name '.yanbao-*' -print -quit)"
      - name: 端到端工程流程
        shell: bash
        run: |
          chmod +x ./yanbao
          project="$RUNNER_TEMP/yanbao-e2e"
          ./yanbao init "$project" --name CI工程 --force
          ./yanbao doctor --manifest-path "$project"
          ./yanbao build --manifest-path "$project" --release
          ./yanbao run --manifest-path "$project"
      - name: 言窗工程创建、检查与 Bundle 端到端
        shell: bash
        run: |
          set -euo pipefail
          test "$(rustc -vV | sed -n 's/^host: //p')" = "${{ matrix.target }}"
          cargo test --manifest-path yanxu-gui/Cargo.toml --workspace --locked
          cargo build --manifest-path yanxu-gui/Cargo.toml --workspace --release --locked
          ./yanxu-gui/scripts/prepare-current.sh yanxu-gui
          project="$RUNNER_TEMP/yanbao-gui-e2e"
          rm -rf "$project"
          ./yanbao new "$project" --name CI言窗 --gui --gui-path "$GITHUB_WORKSPACE/yanxu-gui" --force
          inspect_request="$(jq -cn --arg path "$project" \
            '{protocol_version: 1, operation: "inspect", path: $path}')"
          "$YANXU_BIN" package protocol "$inspect_request" > "$RUNNER_TEMP/yanbao-gui-inspect.json"
          jq -e '
            .ok == true and
            .result.dependencies["言窗"].package == "yanxu-gui" and
            .result.dependencies["言窗"].source == "path" and
            .result.dependencies["言窗"].version == "^1.0"
          ' "$RUNNER_TEMP/yanbao-gui-inspect.json" >/dev/null
          ./yanbao check --manifest-path "$project"
          ./yanbao bundle --manifest-path "$project"
          test "$(find "$project/build" -name bundle-manifest.json -type f | wc -l)" -eq 1
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]]; then
            registry_project="$RUNNER_TEMP/yanbao-gui-registry-e2e"
            rm -rf "$registry_project"
            ./yanbao new "$registry_project" --name CI言窗索引 --gui --force
            registry_request="$(jq -cn --arg path "$registry_project" \
              '{protocol_version: 1, operation: "inspect", path: $path}')"
            "$YANXU_BIN" package protocol "$registry_request" > "$RUNNER_TEMP/yanbao-gui-registry-inspect.json"
            jq -e '
              .ok == true and
              .result.dependencies["言窗"].package == "yanxu-gui" and
              .result.dependencies["言窗"].source == "registry" and
              .result.dependencies["言窗"].source_value == "https://get.yanxu.dev/packages/v1" and
              .result.dependencies["言窗"].version == "^1.0"
            ' "$RUNNER_TEMP/yanbao-gui-registry-inspect.json" >/dev/null
            ./yanbao check --manifest-path "$registry_project"
          fi
