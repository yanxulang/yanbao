name: CI

on:
  push:
  pull_request:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  test:
    name: иЁЂеєЏ 1.1.6 / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: YanXuLang/yanxu
          path: yanxu-core
          ref: v1.1.6
      - name: зј–иЇ‘иЁЂеєЏ 1.1.6 е·Ґе…·й“ѕ
        run: cargo build --manifest-path yanxu-core/Cargo.toml --locked --bin yanxu
      - name: е®љдЅЌе·Ґе…·й“ѕ
        shell: bash
        run: |
          suffix=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          echo "YANXU_BIN=$GITHUB_WORKSPACE/yanxu-core/target/debug/yanxu$suffix" >> "$GITHUB_ENV"
      - name: жЈЂжџҐзєЇиЁЂеєЏе®ћзЋ°дёЋ Unix и„љжњ¬
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test ! -e Cargo.toml
          test -z "$(find src -name '*.rs' -print -quit)"
          sh -n yanbao scripts/install.sh
      - name: жЈЂжџҐзєЇиЁЂеєЏе®ћзЋ°дёЋ Windows и„љжњ¬
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path Cargo.toml) { throw "иЁЂеЊ…дёЌеѕ—еЊ…еђ« Cargo е·ҐзЁ‹" }
          if (Get-ChildItem src -Filter *.rs -Recurse) { throw "иЁЂеЊ…жєђз Ѓеї…йЎ»е®Ње…ЁдЅїз”ЁиЁЂеєЏ" }
          $CmdText = [System.Text.Encoding]::UTF8.GetString(
            [System.IO.File]::ReadAllBytes((Resolve-Path "yanbao.cmd"))
          )
          if ($CmdText -match '[^\x00-\x7F]') { throw "yanbao.cmd еї…йЎ»еЏЄеЊ…еђ« ASCII е­—з¬¦" }
          if (-not $CmdText.Contains("`r`n") -or $CmdText.Replace("`r`n", "").Contains("`n")) {
            throw "yanbao.cmd еї…йЎ»еЏЄдЅїз”Ё CRLF жЌўиЎЊ"
          }
          foreach ($Path in @("yanbao.ps1", "scripts/install.ps1")) {
            $Bytes = [System.IO.File]::ReadAllBytes((Resolve-Path $Path))
            if ($Bytes | Where-Object { $_ -gt 127 }) { throw "$Path еї…йЎ»еЏЄеЊ…еђ« ASCII е­—з¬¦" }
            $Tokens = $null
            $Errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $Path), [ref]$Tokens, [ref]$Errors
            )
            if ($Errors.Count -gt 0) { throw "$Path иЇ­жі•й”™иЇЇпјљ$($Errors -join '; ')" }
            $WindowsPowerShell = Start-Process -FilePath powershell.exe -ArgumentList @(
              "-NoProfile", "-Command",
              "`$errors = `$null; [void][System.Management.Automation.Language.Parser]::ParseFile('$((Resolve-Path $Path).Path)', [ref]`$null, [ref]`$errors); if (`$errors.Count) { `$errors | Format-List; exit 1 }"
            ) -NoNewWindow -Wait -PassThru
            if ($WindowsPowerShell.ExitCode -ne 0) { throw "Windows PowerShell 5.1 ж— жі•и§Јжћђ $Path" }
          }
      - name: з±»ећ‹жЈЂжџҐдёЋи§„ж јжµ‹иЇ•
        shell: bash
        run: |
          "$YANXU_BIN" check src/дё».yx
          "$YANXU_BIN" test tests
      - name: зј–иЇ‘е№¶йЄЊиЇЃз‹¬з«‹еє”з”Ё
        shell: bash
        run: |
          suffix=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          app="$RUNNER_TEMP/yanbao-app$suffix"
          compile_source="$RUNNER_TEMP/yanbao-compile-source"
          rm -rf "$compile_source"
          mkdir -p "$compile_source"
          cp src/*.yx "$compile_source/"
          "$YANXU_BIN" compile "$compile_source/дё».yx" -o "$app" --release --standalone
          version_output="$(YANXU_BIN="$YANXU_BIN" "$app" --version | tr -d '\r')"
          expected="$(printf 'иЁЂеЊ… 0.4.0\nиЁЂеєЏ 1.1.6')"
          test "$version_output" = "$expected"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp "$app" yanbao-app.exe
            launcher_output="$(YANXU_BIN="$YANXU_BIN" ./yanbao.cmd --version | tr -d '\r')"
            rm -f yanbao-app.exe
            test "$launcher_output" = "$expected"
          fi
          standalone_project="$RUNNER_TEMP/yanbao-standalone-e2e"
          YANXU_BIN="$YANXU_BIN" "$app" init "$standalone_project" --name з‹¬з«‹еє”з”ЁйЄЊж”¶ --force
          YANXU_BIN="$YANXU_BIN" "$app" doctor --manifest-path "$standalone_project"
      - name: з«Їе€°з«Їе·ҐзЁ‹жµЃзЁ‹
        shell: bash
        run: |
          chmod +x ./yanbao
          project="$RUNNER_TEMP/yanbao-e2e"
          ./yanbao init "$project" --name CIе·ҐзЁ‹ --force
          ./yanbao doctor --manifest-path "$project"
          ./yanbao build --manifest-path "$project" --release
          ./yanbao run --manifest-path "$project"
