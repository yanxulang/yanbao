name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --check
      - run: cargo test --all-targets --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
