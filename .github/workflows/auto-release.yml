name: Auto Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  quality:
    name: 发布前完整质量门禁
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ github.sha }}

  prepare:
    name: 准备版本标签
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      should_release: ${{ steps.release.outputs.should_release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: 创建缺失的版本标签
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "自动发布只能从 main 分支触发，当前为 $GITHUB_REF" >&2
            exit 1
          fi
          main_commit="$(git rev-parse origin/main)"
          if [[ "$GITHUB_SHA" != "$main_commit" ]]; then
            echo "验收提交 $GITHUB_SHA 已不是 origin/main 最新提交 $main_commit" >&2
            exit 1
          fi
          version="$(sed -n 's/^版本 = "\([^"]*\)"$/\1/p' 言序.toml)"
          test -n "$version"
          grep -Fqx "## $version" CHANGELOG.md
          tag="v$version"
          should_release=false
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$tag:refs/tags/$tag"
            tagged_commit="$(git rev-list -n 1 "$tag")"
            test "$tagged_commit" = "$GITHUB_SHA" || {
              echo "版本 $version 已由另一提交使用；禁止移动既有标签" >&2
              exit 1
            }
            # GraphQL variables must reach gh literally.
            # shellcheck disable=SC2016
            release_state="$(gh api graphql \
              -f owner="$GITHUB_REPOSITORY_OWNER" \
              -f name="${GITHUB_REPOSITORY#*/}" \
              -f tag="$tag" \
              -f query='query($owner: String!, $name: String!, $tag: String!) {
                repository(owner: $owner, name: $name) {
                  release(tagName: $tag) { isDraft isPrerelease }
                }
              }' \
              --jq '.data.repository.release |
                if . == null then "missing"
                elif .isDraft then "draft"
                elif .isPrerelease then "prerelease"
                else "stable" end')"
            if [[ "$release_state" == "stable" ]]; then
              should_release=false
            else
              should_release=true
            fi
          else
            git tag -a "$tag" -m "言包 $version"
            git push origin "$tag"
            # 仓库令牌创建的标签不会递归触发工作流，直接复用完整发布门禁。
            should_release=true
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

  release:
    name: 构建并发布
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit
