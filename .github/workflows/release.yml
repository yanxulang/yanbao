name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 要发布的标签（例如 v0.2.0）
        required: true
        type: string
      build_only:
        description: 只构建和校验制品，不创建 Release
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      tag:
        description: 要发布的标签
        required: true
        type: string
      build_only:
        description: 只构建和校验制品
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  validate:
    name: 校验发布元数据
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      yanxu_version: ${{ steps.metadata.outputs.yanxu_version }}
      commit: ${{ steps.metadata.outputs.commit }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
      - name: 校验标签、版本、工具链与主分支
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^版本 = "\([^"]*\)"$/\1/p' 言序.toml)"
          toolchain="$(sed -n 's/^言序 = "\([^"]*\)"$/\1/p' 言序.toml)"
          test -n "$version"
          test "$RELEASE_TAG" = "v$version"
          if [[ ! "$toolchain" =~ ^\>\=([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "言序.toml 的最低版本必须使用 >=X.Y.Z" >&2
            exit 1
          fi
          yanxu_version="${BASH_REMATCH[1]}"
          grep -Fqx "## $version" CHANGELOG.md
          git fetch origin main --no-tags
          tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
          main_commit="$(git rev-parse origin/main)"
          if ! git merge-base --is-ancestor "$tag_commit" "$main_commit"; then
            echo "标签 $RELEASE_TAG 的提交 $tag_commit 不属于 origin/main 主线" >&2
            exit 1
          fi
          {
            echo "version=$version"
            echo "yanxu_version=$yanxu_version"
            echo "commit=$tag_commit"
          } >> "$GITHUB_OUTPUT"

  quality:
    name: 标签提交完整质量门禁
    needs: validate
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.tag || github.ref_name }}

  build:
    name: 构建 ${{ matrix.target }}
    needs: [validate, quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            windows: false
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            windows: false
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            windows: false
          - runner: macos-latest
            target: aarch64-apple-darwin
            windows: false
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            windows: true
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            windows: true
    runs-on: ${{ matrix.runner }}
    env:
      YANXU_VERSION: ${{ needs.validate.outputs.yanxu_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: 准备构建工具链（Unix）
        if: matrix.windows == false
        shell: bash
        env:
          YANXU_GITHUB_TOKEN: ${{ github.token }}
          YANXU_INSTALL_DIR: ${{ runner.temp }}/yanxu/bin
        run: |
          set -euo pipefail
          curl --disable --fail --location --silent --show-error \
            --proto '=https' --tlsv1.2 \
            "https://raw.githubusercontent.com/YanXuLang/yanxu/v$YANXU_VERSION/scripts/install.sh" \
            --output "$RUNNER_TEMP/install-yanxu.sh"
          sh "$RUNNER_TEMP/install-yanxu.sh"
          echo "YANXU_BIN=$YANXU_INSTALL_DIR/yanxu" >> "$GITHUB_ENV"
      - name: 准备构建工具链（Windows）
        if: matrix.windows == true
        shell: pwsh
        env:
          YANXU_GITHUB_TOKEN: ${{ github.token }}
          YANXU_INSTALL_DIR: ${{ runner.temp }}\yanxu\bin
        run: |
          $Script = Join-Path $env:RUNNER_TEMP "install-yanxu.ps1"
          Invoke-WebRequest -UseBasicParsing -Uri "https://raw.githubusercontent.com/YanXuLang/yanxu/v$env:YANXU_VERSION/scripts/install.ps1" -OutFile $Script
          & $Script
          "YANXU_BIN=$env:YANXU_INSTALL_DIR\yanxu.exe" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
      - name: 生成当前目标依赖锁
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          "$YANXU_BIN" package protocol \
            '{"protocol_version":1,"operation":"resolve","path":".","offline":true}' \
            > "$RUNNER_TEMP/yanbao-resolve.json"
          jq -e --arg target "$TARGET" '.ok == true and .result.target == $target' \
            "$RUNNER_TEMP/yanbao-resolve.json" >/dev/null
          test "$(sed -n 's/^target = "\([^"]*\)"$/\1/p' 言序.lock)" = "$TARGET"
      - name: 构建并封装（Unix）
        if: matrix.windows == false
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          "$YANXU_BIN" check src/主.yx
          "$YANXU_BIN" test tests
          stage="$RUNNER_TEMP/yanbao-$TARGET"
          compile_source="$RUNNER_TEMP/yanbao-compile-source"
          mkdir -p "$stage/schemas" dist
          rm -rf "$compile_source"
          mkdir -p "$compile_source"
          cp src/*.yx "$compile_source/"
          "$YANXU_BIN" compile "$compile_source/主.yx" -o "$stage/yanbao-app" --release --standalone
          install -m 755 yanbao "$stage/yanbao"
          install -m 644 LICENSE README.md CHANGELOG.md "$stage/"
          install -m 644 schemas/yanbao-cli-output-v1.json "$stage/schemas/"
          test -z "$(find "$stage" -maxdepth 1 -type f -name 'yanxu*' -print -quit)"
          version_output="$("$stage/yanbao" --version | tr -d '\r')"
          expected="$(printf '言包 %s\n言序 %s' "$VERSION" "$YANXU_VERSION")"
          test "$version_output" = "$expected"
          project="$RUNNER_TEMP/yanbao-release-e2e"
          "$stage/yanbao" init "$project" --name 发行验收 --force
          "$stage/yanbao" doctor --manifest-path "$project"
          asset="yanbao-$TARGET.tar.gz"
          tar -C "$stage" -czf "dist/$asset" .
          if command -v sha256sum >/dev/null 2>&1; then
            checksum="$(sha256sum "dist/$asset" | awk '{print $1}')"
          else
            checksum="$(shasum -a 256 "dist/$asset" | awk '{print $1}')"
          fi
          printf '%s  %s\n' "$checksum" "$asset" > "dist/yanbao-$TARGET.sha256"
      - name: 构建并封装（Windows）
        if: matrix.windows == true
        shell: pwsh
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          & $env:YANXU_BIN check "src/主.yx"
          if ($LASTEXITCODE -ne 0) { throw "言序类型检查失败" }
          & $env:YANXU_BIN test tests
          if ($LASTEXITCODE -ne 0) { throw "言序规格测试失败" }
          $Stage = Join-Path $env:RUNNER_TEMP "yanbao-$env:TARGET"
          $Dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          $CompileSource = Join-Path $env:RUNNER_TEMP "yanbao-compile-source"
          $SchemaDirectory = Join-Path $Stage "schemas"
          New-Item -ItemType Directory -Force -Path $Stage, $Dist, $CompileSource, $SchemaDirectory | Out-Null
          Copy-Item "src\*.yx" $CompileSource
          $App = Join-Path $Stage "yanbao-app.exe"
          & $env:YANXU_BIN compile (Join-Path $CompileSource "主.yx") -o $App --release --standalone
          if ($LASTEXITCODE -ne 0) { throw "言包独立应用编译失败" }
          Copy-Item yanbao.cmd, yanbao.ps1, LICENSE, README.md, CHANGELOG.md $Stage
          Copy-Item "schemas\yanbao-cli-output-v1.json" $SchemaDirectory
          $CmdPath = Join-Path $Stage "yanbao.cmd"
          $CmdText = [System.IO.File]::ReadAllText($CmdPath).Replace("`r`n", "`n").Replace("`n", "`r`n")
          [System.IO.File]::WriteAllText($CmdPath, $CmdText, [System.Text.UTF8Encoding]::new($false))
          if (Get-ChildItem $Stage -File -Filter "yanxu*") { throw "发行目录不得包含言序运行时" }
          $DirectOutput = @(& $App --version 2>&1)
          $DirectExit = $LASTEXITCODE
          Write-Host "独立应用：$($DirectOutput -join ' ')"
          if ($DirectExit -ne 0) { throw "言包独立应用不能运行（退出码 $DirectExit）" }
          $VersionOutput = @(& (Join-Path $Stage "yanbao.cmd") --version 2>&1)
          $LauncherExit = $LASTEXITCODE
          Write-Host "CMD 启动器：$($VersionOutput -join ' ')"
          if ($LauncherExit -ne 0) { throw "言包发行启动器不能运行（退出码 $LauncherExit）" }
          if ($VersionOutput -notcontains "言包 $env:VERSION") { throw "言包版本不一致" }
          if ($VersionOutput -notcontains "言序 $env:YANXU_VERSION") { throw "言序工具链版本不一致" }
          $Project = Join-Path $env:RUNNER_TEMP "yanbao-release-e2e"
          & (Join-Path $Stage "yanbao.cmd") init $Project --name 发行验收 --force
          if ($LASTEXITCODE -ne 0) { throw "言包不能在发行目录外创建工程" }
          & (Join-Path $Stage "yanbao.cmd") doctor --manifest-path $Project
          if ($LASTEXITCODE -ne 0) { throw "言包发行工程诊断失败" }
          $Asset = "yanbao-$env:TARGET.zip"
          $Archive = Join-Path $Dist $Asset
          Compress-Archive -Path (Join-Path $Stage "*") -DestinationPath $Archive
          $ChecksumPath = Join-Path $Dist "yanbao-$env:TARGET.sha256"
          & "scripts\write-sha256.ps1" -InputPath $Archive -OutputPath $ChecksumPath -AssetName $Asset
      - name: 生成目标构建元数据
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          YANBAO_SOURCE_REF: refs/tags/${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          case "$TARGET" in
            *windows*)
              archive="dist/yanbao-$TARGET.zip"
              application="$RUNNER_TEMP/yanbao-$TARGET/yanbao-app.exe"
              ;;
            *)
              archive="dist/yanbao-$TARGET.tar.gz"
              application="$RUNNER_TEMP/yanbao-$TARGET/yanbao-app"
              ;;
          esac
          lockfile="dist/yanbao-$TARGET.lock"
          cp 言序.lock "$lockfile"
          YANBAO_LOCKFILE="$lockfile" sh scripts/generate-build-metadata.sh \
            "$TARGET" "$archive" "$application" "dist/yanbao-$TARGET.build.json"
      - name: 上传平台制品
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: yanbao-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  supply-chain:
    name: SBOM 与构建证明
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: yanbao-*
          path: dist
          merge-multiple: true
      - name: 汇总目标制品并生成 SBOM
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          YANBAO_SOURCE_REF: refs/tags/${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 24
          test "$(find dist -maxdepth 1 -name '*.build.json' -type f | wc -l)" -eq 6
          test "$(find dist -maxdepth 1 -name '*.lock' -type f | wc -l)" -eq 6
          YANBAO_LOCKFILE="dist/yanbao-x86_64-unknown-linux-gnu.lock" \
            sh scripts/generate-sbom.sh "dist/yanbao-$VERSION.cdx.json"
      - name: 创建构建来源证明
        if: ${{ !inputs.build_only }}
        id: provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/*.build.json
            dist/*.lock
            dist/*.cdx.json
      - name: 创建 SBOM 证明
        if: ${{ !inputs.build_only }}
        id: sbom
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
          sbom-path: dist/yanbao-${{ needs.validate.outputs.version }}.cdx.json
      - name: 准备可下载证明
        if: ${{ !inputs.build_only }}
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          PROVENANCE_BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
          SBOM_BUNDLE: ${{ steps.sbom.outputs.bundle-path }}
        run: |
          set -euo pipefail
          cp "$PROVENANCE_BUNDLE" "dist/yanbao-$VERSION.provenance.jsonl"
          cp "$SBOM_BUNDLE" "dist/yanbao-$VERSION.sbom-attestation.jsonl"
          test -s "dist/yanbao-$VERSION.provenance.jsonl"
          test -s "dist/yanbao-$VERSION.sbom-attestation.jsonl"
      - name: 上传供应链制品
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: yanbao-supply-chain
          path: |
            dist/*.cdx.json
            dist/*.jsonl
          if-no-files-found: error
          retention-days: 7

  publish:
    name: 上传并暂存 Release 草稿
    if: ${{ !inputs.build_only }}
    needs: [validate, build, supply-chain]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read
    outputs:
      url: ${{ steps.release.outputs.url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: yanbao-*
          path: dist
          merge-multiple: true
      - name: 校验全部发行资产
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          YANXU_VERSION: ${{ needs.validate.outputs.yanxu_version }}
          COMMIT_SHA: ${{ needs.validate.outputs.commit }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          targets=(
            x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu
            x86_64-apple-darwin aarch64-apple-darwin
            x86_64-pc-windows-msvc aarch64-pc-windows-msvc
          )
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 27
          command -v sha256sum >/dev/null
          command -v shasum >/dev/null
          manifest_sha="$(sha256sum 言序.toml | awk '{print $1}')"
          sbom_lock="dist/yanbao-x86_64-unknown-linux-gnu.lock"
          test -s "$sbom_lock"
          lock_sha="$(sha256sum "$sbom_lock" | awk '{print $1}')"
          sbom="dist/yanbao-$VERSION.cdx.json"
          provenance="dist/yanbao-$VERSION.provenance.jsonl"
          sbom_attestation="dist/yanbao-$VERSION.sbom-attestation.jsonl"
          test -s "$sbom"
          test -s "$provenance"
          test -s "$sbom_attestation"
          jq -e \
            --arg version "$VERSION" \
            --arg minimum "$YANXU_VERSION" \
            --arg commit "$COMMIT_SHA" \
            --arg manifest_sha "$manifest_sha" \
            --arg lock_sha "$lock_sha" \
            '.bomFormat == "CycloneDX" and .specVersion == "1.5"
             and (.serialNumber | test("^urn:uuid:[0-9a-f]{8}-[0-9a-f]{4}-8[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"))
             and .metadata.component.version == $version
             and ([.metadata.component.properties[] |
               select(.name == "cdx:yanbao:source:commit" and .value == $commit)] | length) == 1
             and ([.metadata.component.properties[] |
               select(.name == "cdx:yanbao:manifest:sha256" and .value == $manifest_sha)] | length) == 1
             and ([.metadata.component.properties[] |
               select(.name == "cdx:yanbao:lock:sha256" and .value == $lock_sha)] | length) == 1
             and ([.components[] |
               select(.name == "yanxu" and .version == $minimum and .scope == "required")] | length) == 1' \
            "$sbom" >/dev/null
          if grep -F "$GITHUB_WORKSPACE" "$sbom" >/dev/null; then
            echo "SBOM 不得包含构建机绝对路径" >&2
            exit 1
          fi
          for target in "${targets[@]}"; do
            case "$target" in *windows*) archive="yanbao-$target.zip" ;; *) archive="yanbao-$target.tar.gz" ;; esac
            test -f "dist/$archive"
            test -f "dist/yanbao-$target.sha256"
            test "$(wc -l < "dist/yanbao-$target.sha256")" -eq 1
            if LC_ALL=C grep -q $'\r' "dist/yanbao-$target.sha256"; then
              echo "yanbao-$target.sha256 不得包含 CR 字节" >&2
              exit 1
            fi
            (cd dist && sha256sum --check "yanbao-$target.sha256")
            (cd dist && shasum -a 256 --check "yanbao-$target.sha256")
            case "$archive" in
              *.zip) entries="$(unzip -Z1 "dist/$archive")" ;;
              *) entries="$(tar -tzf "dist/$archive")" ;;
            esac
            printf '%s\n' "$entries" | grep -Eq '(^|/)schemas/yanbao-cli-output-v1\.json$'
            if printf '%s\n' "$entries" | sed 's#/$##; s#^.*/##' | grep -Eq '^yanxu([.-]|$)'; then
              echo "$archive 不得包含言序运行时" >&2
              exit 1
            fi
            extracted="$RUNNER_TEMP/yanbao-release-$target"
            mkdir -p "$extracted"
            case "$archive" in
              *.zip) unzip -q "dist/$archive" -d "$extracted" ;;
              *) tar -xzf "dist/$archive" -C "$extracted" ;;
            esac
            application_name="yanbao-app"
            case "$target" in *windows*) application_name="yanbao-app.exe" ;; esac
            test "$(find "$extracted" -type f -name "$application_name" | wc -l)" -eq 1
            application="$(find "$extracted" -type f -name "$application_name")"
            application_sha="$(sha256sum "$application" | awk '{print $1}')"
            application_bytes="$(wc -c < "$application" | tr -d ' ')"
            archive_sha="$(sha256sum "dist/$archive" | awk '{print $1}')"
            lockfile="dist/yanbao-$target.lock"
            test -s "$lockfile"
            test "$(sed -n 's/^target = "\([^"]*\)"$/\1/p' "$lockfile")" = "$target"
            test "$(sed -n 's/^manifest_checksum = "\([0-9a-f]*\)"$/\1/p' "$lockfile")" = "$manifest_sha"
            lock_sha="$(sha256sum "$lockfile" | awk '{print $1}')"
            metadata="dist/yanbao-$target.build.json"
            test -s "$metadata"
            jq -e \
              --arg version "$VERSION" \
              --arg minimum "$YANXU_VERSION" \
              --arg commit "$COMMIT_SHA" \
              --arg ref "refs/tags/$RELEASE_TAG" \
              --arg target "$target" \
              --arg archive "$archive" \
              --arg archive_sha "$archive_sha" \
              --arg application "$application_name" \
              --arg application_sha "$application_sha" \
              --argjson application_bytes "$application_bytes" \
              --arg manifest_sha "$manifest_sha" \
              --arg lock_sha "$lock_sha" \
              '.schema_version == 1 and .version == $version
               and .minimum_yanxu_version == $minimum
               and .source.commit_sha == $commit and .source.ref == $ref
               and .artifact.name == $archive and .artifact.sha256 == $archive_sha
               and .application.name == $application
               and .application.sha256 == $application_sha
               and .application.bytes == $application_bytes
               and .build.target == $target and .build.profile == "release"
               and .build.standalone and (.build.separate_runtime_bundled | not)
               and .build.compiler.version == $minimum
               and .build.compiler.target == $target and .build.compiler.mode == "release"
               and .build.manifest.sha256 == $manifest_sha
               and .build.lock.sha256 == $lock_sha and .build.lock.target == $target
               and .build.lock.manifest_sha256 == $manifest_sha
               and .application.version_info.version == $version
               and .application.version_info.yanxu_version == $minimum' \
              "$metadata" >/dev/null
            gh attestation verify "dist/$archive" --repo "$REPOSITORY" \
              --signer-repo "$REPOSITORY" --bundle "$provenance" \
              --source-digest "$COMMIT_SHA" >/dev/null
            gh attestation verify "dist/$archive" --repo "$REPOSITORY" \
              --signer-repo "$REPOSITORY" --bundle "$sbom_attestation" \
              --predicate-type "https://cyclonedx.org/bom" \
              --source-digest "$COMMIT_SHA" >/dev/null
          done
      - name: 生成发行说明
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          YANXU_VERSION: ${{ needs.validate.outputs.yanxu_version }}
        shell: bash
        run: |
          awk -v header="## $VERSION" '
            $0 == header { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
          sed "s/__YANXU_VERSION__/$YANXU_VERSION/g" >> release-notes.md <<'EOF'

          ### 安装

          请先安装言序 __YANXU_VERSION__ 或更高版本，并确保 `yanxu` 位于 `PATH` 中。

          macOS / Linux：

          ```sh
          curl --proto '=https' --tlsv1.2 -sSfL https://raw.githubusercontent.com/YanXuLang/yanbao/main/scripts/install.sh | sh
          ```

          Windows PowerShell：

          ```powershell
          irm https://raw.githubusercontent.com/YanXuLang/yanbao/main/scripts/install.ps1 | iex
          ```
          EOF
      - name: 创建或更新发行版
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
            gh release edit "$RELEASE_TAG" \
              --title "言包 $VERSION" --notes-file release-notes.md \
              --draft=true --prerelease=false --verify-tag
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "言包 $VERSION" --notes-file release-notes.md \
              --draft --prerelease=false --verify-tag
          fi
          echo "url=$(gh release view "$RELEASE_TAG" --json url --jq .url)" >> "$GITHUB_OUTPUT"

  publicize:
    name: 完整制品上传后公开 Release
    if: ${{ !inputs.build_only }}
    needs: [validate, build, supply-chain, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 公开已经完整上传的草稿
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --draft=false --prerelease=false --latest=false --verify-tag \
            --title "言包 $VERSION"

  smoke:
    name: 安装冒烟 / ${{ matrix.os }}
    needs: [validate, publicize]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      YANXU_VERSION: ${{ needs.validate.outputs.yanxu_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: 使用本机言序安装并验证（Unix）
        if: runner.os != 'Windows'
        shell: bash
        env:
          YANBAO_GITHUB_TOKEN: ${{ github.token }}
          YANBAO_INSTALL_DIR: ${{ runner.temp }}/yanbao/bin
          YANBAO_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          curl --disable --fail --location --silent --show-error \
            --proto '=https' --tlsv1.2 \
            "https://raw.githubusercontent.com/YanXuLang/yanxu/v$YANXU_VERSION/scripts/install.sh" \
            --output "$RUNNER_TEMP/install-yanxu.sh"
          YANXU_GITHUB_TOKEN="$YANBAO_GITHUB_TOKEN" \
            YANXU_INSTALL_DIR="$RUNNER_TEMP/yanxu/bin" \
            sh "$RUNNER_TEMP/install-yanxu.sh"
          export YANXU_BIN="$RUNNER_TEMP/yanxu/bin/yanxu"
          sh scripts/install.sh
          version_output="$("$YANBAO_INSTALL_DIR/yanbao" --version | tr -d '\r')"
          expected="$(printf '言包 %s\n言序 %s' "$YANBAO_VERSION" "$YANXU_VERSION")"
          test "$version_output" = "$expected"
      - name: 使用本机言序安装并验证（Windows）
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          YANBAO_GITHUB_TOKEN: ${{ github.token }}
          YANBAO_INSTALL_DIR: ${{ runner.temp }}\yanbao\bin
          YANBAO_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          $YanxuInstaller = Join-Path $env:RUNNER_TEMP "install-yanxu.ps1"
          Invoke-WebRequest -UseBasicParsing -Uri "https://raw.githubusercontent.com/YanXuLang/yanxu/v$env:YANXU_VERSION/scripts/install.ps1" -OutFile $YanxuInstaller
          $env:YANXU_GITHUB_TOKEN = $env:YANBAO_GITHUB_TOKEN
          $env:YANXU_INSTALL_DIR = Join-Path $env:RUNNER_TEMP "yanxu\bin"
          & $YanxuInstaller
          $env:YANXU_BIN = Join-Path $env:YANXU_INSTALL_DIR "yanxu.exe"
          $originalModulePath = $env:PSModulePath
          try {
            $env:PSModulePath = @(
              (Join-Path $env:ProgramFiles "WindowsPowerShell\Modules")
              (Join-Path $env:WINDIR "System32\WindowsPowerShell\v1.0\Modules")
              $originalModulePath
            ) -join ";"
            $Installer = Start-Process -FilePath powershell.exe -ArgumentList @(
              "-NoProfile", "-Command",
              'Get-Content -Raw -Encoding ASCII scripts/install.ps1 | Invoke-Expression'
            ) -NoNewWindow -Wait -PassThru
          } finally {
            $env:PSModulePath = $originalModulePath
          }
          if ($Installer.ExitCode -ne 0) { throw "Windows PowerShell 5.1 管道安装失败" }
          $Output = @(& "$env:YANBAO_INSTALL_DIR\yanbao.cmd" --version 2>&1)
          if ($LASTEXITCODE -ne 0) { throw "安装后的言包不能运行" }
          if ($Output -notcontains "言包 $env:YANBAO_VERSION") { throw "言包版本不一致" }
          if ($Output -notcontains "言序 $env:YANXU_VERSION") { throw "言序工具链版本不一致" }

  finalize:
    name: 确认正式发行
    needs: [validate, publicize, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: 复验公开资产并设置 latest
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          YANXU_VERSION: ${{ needs.validate.outputs.yanxu_version }}
          COMMIT_SHA: ${{ needs.validate.outputs.commit }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir dist
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 27
          manifest_sha="$(sha256sum 言序.toml | awk '{print $1}')"
          sbom_lock="dist/yanbao-x86_64-unknown-linux-gnu.lock"
          test -s "$sbom_lock"
          lock_sha="$(sha256sum "$sbom_lock" | awk '{print $1}')"
          sbom="dist/yanbao-$VERSION.cdx.json"
          provenance="dist/yanbao-$VERSION.provenance.jsonl"
          sbom_attestation="dist/yanbao-$VERSION.sbom-attestation.jsonl"
          test -s "$sbom"
          test -s "$provenance"
          test -s "$sbom_attestation"
          jq -e \
            --arg version "$VERSION" \
            --arg minimum "$YANXU_VERSION" \
            --arg commit "$COMMIT_SHA" \
            --arg manifest_sha "$manifest_sha" \
            --arg lock_sha "$lock_sha" \
            '.bomFormat == "CycloneDX" and .specVersion == "1.5"
             and (.serialNumber | test("^urn:uuid:[0-9a-f]{8}-[0-9a-f]{4}-8[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"))
             and .metadata.component.version == $version
             and ([.metadata.component.properties[] |
               select(.name == "cdx:yanbao:source:commit" and .value == $commit)] | length) == 1
             and ([.metadata.component.properties[] |
               select(.name == "cdx:yanbao:manifest:sha256" and .value == $manifest_sha)] | length) == 1
             and ([.metadata.component.properties[] |
               select(.name == "cdx:yanbao:lock:sha256" and .value == $lock_sha)] | length) == 1
             and ([.components[] |
               select(.name == "yanxu" and .version == $minimum and .scope == "required")] | length) == 1' \
            "$sbom" >/dev/null
          targets=(
            x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu
            x86_64-apple-darwin aarch64-apple-darwin
            x86_64-pc-windows-msvc aarch64-pc-windows-msvc
          )
          for target in "${targets[@]}"; do
            case "$target" in *windows*) archive="yanbao-$target.zip" ;; *) archive="yanbao-$target.tar.gz" ;; esac
            (cd dist && sha256sum --check "yanbao-$target.sha256")
            (cd dist && shasum -a 256 --check "yanbao-$target.sha256")
            extracted="$RUNNER_TEMP/yanbao-release-$target"
            mkdir -p "$extracted"
            case "$archive" in
              *.zip) unzip -q "dist/$archive" -d "$extracted" ;;
              *) tar -xzf "dist/$archive" -C "$extracted" ;;
            esac
            application_name="yanbao-app"
            case "$target" in *windows*) application_name="yanbao-app.exe" ;; esac
            test "$(find "$extracted" -type f -name "$application_name" | wc -l)" -eq 1
            application="$(find "$extracted" -type f -name "$application_name")"
            application_sha="$(sha256sum "$application" | awk '{print $1}')"
            application_bytes="$(wc -c < "$application" | tr -d ' ')"
            archive_sha="$(sha256sum "dist/$archive" | awk '{print $1}')"
            lockfile="dist/yanbao-$target.lock"
            test -s "$lockfile"
            test "$(sed -n 's/^target = "\([^"]*\)"$/\1/p' "$lockfile")" = "$target"
            test "$(sed -n 's/^manifest_checksum = "\([0-9a-f]*\)"$/\1/p' "$lockfile")" = "$manifest_sha"
            lock_sha="$(sha256sum "$lockfile" | awk '{print $1}')"
            jq -e \
              --arg version "$VERSION" \
              --arg minimum "$YANXU_VERSION" \
              --arg commit "$COMMIT_SHA" \
              --arg target "$target" \
              --arg archive "$archive" \
              --arg archive_sha "$archive_sha" \
              --arg application "$application_name" \
              --arg application_sha "$application_sha" \
              --argjson application_bytes "$application_bytes" \
              --arg manifest_sha "$manifest_sha" \
              --arg lock_sha "$lock_sha" \
              '.version == $version and .minimum_yanxu_version == $minimum
               and .source.commit_sha == $commit
               and .artifact.name == $archive and .artifact.sha256 == $archive_sha
               and .application.name == $application
               and .application.sha256 == $application_sha
               and .application.bytes == $application_bytes
               and .build.target == $target and .build.compiler.target == $target
               and .build.manifest.sha256 == $manifest_sha
               and .build.lock.sha256 == $lock_sha and .build.lock.target == $target
               and .build.lock.manifest_sha256 == $manifest_sha' \
              "dist/yanbao-$target.build.json" >/dev/null
            gh attestation verify "dist/$archive" --repo "$GITHUB_REPOSITORY" \
              --signer-repo "$GITHUB_REPOSITORY" --bundle "$provenance" \
              --source-digest "$COMMIT_SHA" >/dev/null
            gh attestation verify "dist/$archive" --repo "$GITHUB_REPOSITORY" \
              --signer-repo "$GITHUB_REPOSITORY" --bundle "$sbom_attestation" \
              --predicate-type "https://cyclonedx.org/bom" \
              --source-digest "$COMMIT_SHA" >/dev/null
          done
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --draft=false --prerelease=false --latest --verify-tag
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json isDraft,isPrerelease,assets \
            --jq 'select(.isDraft == false and .isPrerelease == false and (.assets | length) == 27)' >/dev/null

  quarantine:
    name: 隔离验收失败的发行版
    if: ${{ always() && needs.publicize.result == 'success' && (needs.smoke.result != 'success' || needs.finalize.result != 'success') }}
    needs: [publicize, smoke, finalize]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 转为草稿并使工作流失败
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=true
          echo "发布后验收未通过，Release 已转回草稿。" >&2
          exit 1
